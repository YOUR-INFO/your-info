<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - Your Info</title>
  <script type="module" crossorigin src="/assets/calendar-ChYeIt3j.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabase-oO2abd2n.js">
  <link rel="modulepreload" crossorigin href="/assets/calendar-CESsXbvM.js">
  <link rel="stylesheet" crossorigin href="/assets/supabase-Bq2pTEzh.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/dashboard.html" class="logo">Your Info</a>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="/dashboard.html">Home</a></li>
        <li><a href="/profile.html">Profile</a></li>
        <li><a href="/achievements.html">Achievements</a></li>
        <li><a href="/calendar.html" class="active">Calendar</a></li>
        <li><a href="/settings.html">Settings</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <li><button id="logoutBtn" class="btn btn-primary btn-small">Logout</button></li>
      </ul>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 1rem;">
    <div class="calendar-container">
      <div class="calendar-header">
        <h1>My Calendar</h1>
        <button id="addEventBtn" class="btn btn-primary">Add Event</button>
      </div>

      <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
        <button id="showAll" class="btn btn-outline btn-small active-filter">All Events</button>
        <button id="showPending" class="btn btn-outline btn-small">Pending</button>
        <button id="showCompleted" class="btn btn-outline btn-small">Completed</button>
      </div>

      <div id="eventsList">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="eventModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Event</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>

      <div id="modalError" class="alert alert-error" style="display: none;"></div>

      <form id="eventForm">
        <div class="form-group">
          <label for="eventTitle">Title</label>
          <input type="text" id="eventTitle" name="title" required>
        </div>

        <div class="form-group">
          <label for="eventDescription">Description</label>
          <textarea id="eventDescription" name="description" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="eventDate">Date & Time</label>
          <input type="datetime-local" id="eventDate" name="event_date" required>
        </div>

        <div class="form-group">
          <label for="remindBefore">Remind me before (days)</label>
          <input type="number" id="remindBefore" name="remind_before_days" min="0" max="30" value="1">
        </div>

        <div class="form-group">
          <label for="eventColor">Color</label>
          <select id="eventColor" name="color">
            <option value="#3B82F6">Blue</option>
            <option value="#10B981">Green</option>
            <option value="#F59E0B">Orange</option>
            <option value="#EF4444">Red</option>
            <option value="#8B5CF6">Purple</option>
            <option value="#EC4899">Pink</option>
          </select>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-outline" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Your Info. All rights reserved.</p>
    <div class="footer-links">
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </div>
  </footer>

</body>
</html>
