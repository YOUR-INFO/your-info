<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Your Info</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p>Join Your Info to create your personal portfolio</p>

      <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
      <div id="successMessage" class="alert alert-success" style="display: none;"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required minlength="3" autocomplete="username">
          <small style="color: var(--text-secondary); font-size: 0.875rem;">At least 3 characters, unique identifier</small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
          <small style="color: var(--text-secondary); font-size: 0.875rem;">At least 6 characters</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
        Already have an account?
        <a href="/login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Login</a>
      </p>

      <p style="margin-top: 1rem; text-align: center;">
        <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { handleSignup } from './js/auth.js';

    const form = document.getElementById('signupForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }

      try {
        await handleSignup(username, password);
        successMessage.textContent = 'Account created successfully! Redirecting to login...';
        successMessage.style.display = 'block';

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);
      } catch (error) {
        let errorMsg = error.message;
        if (errorMsg.includes('duplicate key')) {
          errorMsg = 'Username already exists. Please choose a different username.';
        }
        errorMessage.textContent = errorMsg;
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
