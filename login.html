<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Your Info</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p>Login to your account to continue</p>

      <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
        Don't have an account?
        <a href="/signup.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Sign up</a>
      </p>

      <p style="margin-top: 1rem; text-align: center;">
        <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { handleLogin } from './js/auth.js';

    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errorMessage.style.display = 'none';

      try {
        await handleLogin(username, password);
        window.location.href = '/dashboard.html';
      } catch (error) {
        errorMessage.textContent = error.message || 'Login failed. Please check your credentials.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
